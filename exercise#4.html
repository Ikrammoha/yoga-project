<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   
    <title>Conference Registration Form</title>
</head>
<body>

    <h1>Tech Conference Registration Form</h1>

    <form action="#" method="POST">

       
        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname"><br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="contact">Contact Number:</label><br>
            <input type="text" id="contact"  name="contact" placeholder="+252 61XXXXXXX"><br><br>
                
               
                
            
        </fieldset>

        <br>

        
        <fieldset>
            <legend>Conference Details</legend>

            <p>Preferred Day(s) of Attendance:</p>

            <input type="checkbox" id="day1" name="days" value="Day 1">
            <label for="day1">Day 1</label><br>

            <input type="checkbox" id="day2" name="days" value="Day 2">
            <label for="day2">Day 2</label><br>

            <input type="checkbox" id="day3" name="days" value="Day 3">
            <label for="day3">Day 3</label><br><br>

            <p>Type of Attendance:</p>

            <input type="radio" id="virtual" name="attendance" value="Virtual">
            <label for="virtual">Virtual</label><br>

            <input type="radio" id="in-person" name="attendance" value="In-person">
            <label for="inperson">In-person</label><br><br>

            <label for="shirt">T-shirt Size:</label><br>
            <select id="shirt" name="shirt">
                <option value="">Select Size</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
                <option value="XXL">XXL</option>
            </select>
        </fieldset>

        <br>

       
        <fieldset>
            <legend>Sessions of Interest</legend>

            <input type="checkbox" id="webdev" name="interest" value="Web Development">
            <label for="webdev">Web Development</label><br>

            <input type="checkbox" id="datascience" name="interest" value="Data Science">
            <label for="datascience">Data Science</label><br>

            <input type="checkbox" id="cloud" name="interest" value="Cloud Computing">
            <label for="cloud">Cloud Computing</label><br>

            <input type="checkbox" id="cyber" name="interest" value="Cybersecurity">
            <label for="cyber">Cybersecurity</label><br>

            <input type="checkbox" id="ai" name="interest" value="AI & Machine Learning">
            <label for="ai">AI & Machine Learning</label><br>
        </fieldset>

        <br>

        
        <fieldset>
            <legend>Dietary Preferences</legend>

            <input type="checkbox" id="vegetarian" name="diet" value="Vegetarian">
            <label for="vegetarian">Vegetarian</label><br>

            <input type="checkbox" id="vegan" name="diet" value="Vegan">
            <label for="vegan">Vegan</label><br>

            <input type="checkbox" id="gluten" name="diet" value="Gluten-Free">
            <label for="gluten">Gluten-Free</label><br>

            <input type="checkbox" id="nutfree" name="diet" value="Nut-Free">
            <label for="nutfree">Nut-Free</label><br>

            <input type="checkbox" id="dairyfree" name="diet" value="Dairy-Free">
            <label for="dairyfree">Dairy-Free</label><br>

            <input type="checkbox" id="norestrictions" name="diet" value="No Restrictions">
            <label for="norestrictions">No Restrictions</label><br>
        </fieldset>

        <br>

        
        <fieldset>
            <legend>Additional Comments</legend>

            <label for="comments">Comments or Requirements:</label><br>
            <textarea 
                id="comments" 
                name="comments" 
                rows="5" 
                cols="40"
                placeholder="Enter your comments here..."
            ></textarea>
        </fieldset>

        <br>

      
        <fieldset>
            <legend>Consent</legend>

            <input type="checkbox" id="consent" name="consent" required>
            <label for="consent">
                I agree to receive conference updates via email.
            </label>
        </fieldset>

        <br>

        <!-- Submit Button -->
        <input type="submit" value="Register">

    </form>

</body>
</html>
